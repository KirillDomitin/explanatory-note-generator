<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<title>Sign in</title>
<style>
:root {
  --bg: #0e1117;
  --card: #161b22;
  --border: #30363d;
  --text: #e6edf3;
  --muted: #8b949e;
  --accent: #2f81f7;
}

* {
  box-sizing: border-box;
  font-family: Inter, system-ui, sans-serif;
}

body {
  margin: 0;
  height: 100vh;
  background: radial-gradient(circle at top, #1f2937, var(--bg));
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text);
}

.card {
  width: 380px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 32px;
  box-shadow: 0 20px 40px rgba(0,0,0,.5);
}

h1 {
  margin: 0 0 8px;
  font-size: 26px;
}

p {
  margin: 0 0 24px;
  color: var(--muted);
}

input {
  width: 100%;
  padding: 14px;
  margin-bottom: 14px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: #0d1117;
  color: var(--text);
  font-size: 15px;
}

input:focus {
  outline: none;
  border-color: var(--accent);
}

button {
  width: 100%;
  padding: 14px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(135deg, #1f6feb, var(--accent));
  color: white;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
}

button:hover {
  opacity: .9;
}
</style>
</head>
<body>

<div class="card">
  <h1>Welcome back</h1>
  <p>Sign in to continue</p>

  <input id="login" placeholder="Login" />
  <input id="password" type="password" placeholder="Password" />

  <button onclick="login()">Sign in</button>
</div>

<script>
async function login() {
  const form = new URLSearchParams();
  form.append("username", document.getElementById("login").value);
  form.append("password", document.getElementById("password").value);

  const res = await fetch("/api/v1/auth/login", {
    method: "POST",
    headers: {
      "Content-Type": "application/x-www-form-urlencoded"
    },
    body: form.toString()
  });

  if (!res.ok) {
    alert("Invalid login or password");
    return;
  }

  const data = await res.json();
  localStorage.setItem("access_token", data.access_token);
  localStorage.setItem("refresh_token", data.refresh_token);

  window.location.href = "/";
}
</script>

</body>
</html>
