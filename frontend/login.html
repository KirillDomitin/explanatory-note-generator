<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Вход</title>
    <link rel="stylesheet" href="./css/styles.css"/>
</head>
<body class="page-login">
<div class="card">
    <h1>Вход в систему</h1>
    <p class="subtitle">Авторизуйтесь, чтобы продолжить работу</p>

    <div class="access-info">
        Для получения доступа к сервису обратитесь к администратору.
        <br>
        <span>Контакт для доступа: [вы знаете кому писать]</span>
    </div>

    <input id="login" class="login-input" placeholder="Логин"/>
    <input id="password" class="login-input" type="password" placeholder="Пароль"/>

    <button id="login-btn" class="login-button">Войти</button>
    <div id="error" class="error"></div>
</div>

<script src="./js/login.js"></script>
</body>
</html>
