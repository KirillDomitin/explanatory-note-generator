<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8"/>
    <title>Dashboard</title>
    <style>
        :root {
          --bg: #0e1117;
          --card: #161b22;
          --border: #30363d;
          --text: #e6edf3;
          --muted: #8b949e;
          --accent: #2f81f7;
          --success: #2ea043;
          --danger: #f85149;
        }

        * {
          box-sizing: border-box;
          font-family: Inter, system-ui, sans-serif;
        }

        body {
          margin: 0;
          background: var(--bg);
          color: var(--text);
        }

        header {
          padding: 20px 32px;
          border-bottom: 1px solid var(--border);
          display: flex;
          justify-content: space-between;
          align-items: center;
        }

        header h2 {
          margin: 0;
          font-size: 20px;
        }

        .logout {
          color: var(--muted);
          cursor: pointer;
        }

        .logout:hover {
          color: var(--text);
        }

        .container {
          max-width: 1280px;
          margin: 40px auto;
          padding: 0 24px;
        }

        .layout {
          display: grid;
          grid-template-columns: minmax(420px, 1.2fr) minmax(320px, 0.8fr);
          gap: 24px;
          align-items: start;
        }

        .card {
          background: var(--card);
          border: 1px solid var(--border);
          border-radius: 16px;
          padding: 24px;
          box-shadow: 0 12px 30px rgba(0, 0, 0, .4);
        }

        .card h3 {
          margin-top: 0;
          margin-bottom: 20px;
        }

        input {
          width: 100%;
          padding: 14px;
          border-radius: 10px;
          border: 1px solid var(--border);
          background: #0d1117;
          color: var(--text);
          margin-bottom: 16px;
          outline: none;
        }

        input:focus {
          border-color: var(--accent);
        }

        button {
          padding: 14px 24px;
          border-radius: 10px;
          border: none;
          background: var(--accent);
          color: white;
          font-weight: 600;
          cursor: pointer;
        }

        button:disabled {
          opacity: 0.7;
          cursor: not-allowed;
        }

        pre {
          margin-top: 20px;
          background: #0d1117;
          border-radius: 10px;
          padding: 16px;
          border: 1px solid var(--border);
          color: #9ecbff;
          white-space: pre-wrap;
          word-break: break-word;
          min-height: 72px;
        }

        .history-list {
          display: flex;
          flex-direction: column;
          gap: 12px;
        }

        .history-item {
          background: #0d1117;
          border: 1px solid var(--border);
          border-radius: 12px;
          padding: 14px;
        }

        .history-item-clickable {
          cursor: pointer;
          transition: 0.15s;
        }

        .history-item-clickable:hover {
          border-color: var(--accent);
          background: #111827;
        }

        .history-item-header {
          display: flex;
          align-items: center;
          gap: 10px;
          margin-bottom: 10px;
        }

        .status-dot {
          width: 10px;
          height: 10px;
          border-radius: 50%;
          flex-shrink: 0;
        }

        .status-success {
          background: var(--success);
        }

        .status-failed {
          background: var(--danger);
        }

        .history-date {
          font-size: 14px;
        }

        .history-line {
          font-size: 14px;
          line-height: 1.5;
        }

        .history-name {
          color: var(--muted);
        }

        .history-error {
          margin-top: 6px;
          color: var(--danger);
        }

        .history-loading,
        .history-empty,
        .history-error-state {
          color: var(--muted);
          font-size: 14px;
        }

        @media (max-width: 980px) {
          .layout {
            grid-template-columns: 1fr;
          }
        }
    </style>
</head>
<body>

<header>
    <h2>🚀 Backend Dashboard</h2>
    <div class="logout" onclick="logout()">Logout</div>
</header>

<div class="container">
    <div class="layout">
        <div class="card">
            <h3>Генератор пояснительной записки</h3>
            <input id="value" placeholder="Введите ИНН..."/>
            <button id="generate-btn" onclick="send()">Генерировать</button>
            <pre id="result"></pre>
        </div>

        <div class="card">
            <h3>История запросов</h3>
            <div id="history-list" class="history-list">
                <div class="history-loading">Загрузка истории...</div>
            </div>
        </div>
    </div>
</div>

<script>
const HISTORY_LIMIT = 20;
const LOGIN_PAGE_URL = "/login.html";

const historyEl = document.getElementById("history-list");
const resultEl = document.getElementById("result");
const innInputEl = document.getElementById("value");
const generateButtonEl = document.getElementById("generate-btn");

document.addEventListener("DOMContentLoaded", initPage);

async function initPage() {
  const isAuthenticated = await ensureAuthenticated();
  if (!isAuthenticated) return redirectToLogin();
  await loadHistory();
}

async function authFetch(url, options = {}, retry = true) {
  const res = await fetch(url, { credentials: "include", ...options });

  if (res.status !== 401) return res;

  if (!retry) {
    redirectToLogin();
    return res;
  }

  const refreshed = await tryRefresh();
  if (!refreshed) {
    redirectToLogin();
    return res;
  }

  return fetch(url, { credentials: "include", ...options });
}

async function ensureAuthenticated() {
  const res = await authFetch("/api/v1/auth/me");
  return res.ok;
}

async function tryRefresh() {
  try {
    const res = await fetch("/api/v1/auth/refresh", {
      method: "POST",
      credentials: "include"
    });
    return res.ok;
  } catch {
    return false;
  }
}

async function logout() {
  await fetch("/api/v1/auth/logout", { method: "POST", credentials: "include" });
  redirectToLogin();
}

async function loadHistory() {
  setHistoryState("loading");

  try {
    const res = await authFetch(`/api/v1/user-requests?limit=${HISTORY_LIMIT}&offset=0`);
    if (!res.ok) return setHistoryState("error");

    const data = await res.json();
    renderHistory(data.items || []);
  } catch {
    setHistoryState("error");
  }
}

function renderHistory(items) {
  historyEl.innerHTML = "";

  if (!items.length) {
    return setHistoryState("empty");
  }

  const fragment = document.createDocumentFragment();

  for (const item of items) {
    const isSuccess = item.status === "success";

    const el = document.createElement("div");
    el.className = "history-item";

    if (isSuccess && item.inn) {
      el.classList.add("history-item-clickable");

      el.addEventListener("click", () => {
        innInputEl.value = item.inn;
        innInputEl.focus();
        innInputEl.select();
      });
    }

    el.innerHTML = `
      <div class="history-item-header">
        <span class="status-dot ${isSuccess ? "status-success" : "status-failed"}"></span>
        <div class="history-date">${formatDate(item.created_at)}</div>
      </div>

      <div class="history-line">ИНН: ${item.inn || "—"}</div>
      <div class="history-line history-name">${item.name || "—"}</div>

      ${!isSuccess && item.error_message
        ? `<div class="history-line history-error">Ошибка: ${item.error_message}</div>`
        : ""}
    `;

    fragment.appendChild(el);
  }

  historyEl.appendChild(fragment);
}

function formatDate(value) {
  const d = new Date(value);
  return `${String(d.getDate()).padStart(2,"0")}.${String(d.getMonth()+1).padStart(2,"0")}.${d.getFullYear()} ${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
}

function setHistoryState(state) {
  if (state === "loading") historyEl.innerHTML = `<div class="history-loading">Загрузка...</div>`;
  if (state === "empty") historyEl.innerHTML = `<div class="history-empty">История пуста</div>`;
  if (state === "error") historyEl.innerHTML = `<div class="history-error-state">Ошибка загрузки</div>`;
}

async function send() {
  const inn = innInputEl.value.trim();
  if (!inn) return resultEl.textContent = "Введите ИНН";

  generateButtonEl.disabled = true;
  resultEl.textContent = "Выполняется...";

  try {
    const res = await authFetch(`/api/v1/generate/?inn=${encodeURIComponent(inn)}`);

    if (!res.ok) {
      resultEl.textContent = await res.text() || "Ошибка";
      return;
    }

    const blob = await res.blob();
    downloadBlob(blob, `document_${inn}.docx`);
    resultEl.textContent = "Готово";
  } catch {
    resultEl.textContent = "Ошибка сети";
  } finally {
    generateButtonEl.disabled = false;
    await loadHistory();
  }
}

function downloadBlob(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}

function redirectToLogin() {
  window.location.href = LOGIN_PAGE_URL;
}
</script>

</body>
</html>
