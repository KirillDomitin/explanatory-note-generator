<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Личный кабинет</title>
    <link rel="stylesheet" href="./css/styles.css"/>
</head>
<body class="page-dashboard">
<header>
    <h2>🚀 Сервис генерации пояснительной записки</h2>
    <div class="header-right">
        <div id="user-name" class="user-name">Загрузка пользователя...</div>
        <div id="logout-btn" class="logout">Выйти</div>
    </div>
</header>

<div class="container">
    <div class="layout">
        <section class="card">
            <h3>Генератор пояснительной записки</h3>
            <input id="value" placeholder="Введите ИНН..."/>
            <button id="generate-btn" class="generate-button">Сгенерировать</button>
            <pre id="result" class="result-box"></pre>
        </section>

        <section class="card">
            <h3>История запросов</h3>
            <div id="history-list" class="history-list">
                <div class="history-loading">Загрузка истории...</div>
            </div>
        </section>
    </div>
</div>

<script src="./js/index.js"></script>
</body>
</html>
