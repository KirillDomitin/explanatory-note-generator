name: Release to Docker Hub

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Add uv to PATH
        run: echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install backend dependencies
        working-directory: ./backend
        run: uv sync --dev

      - name: Run backend tests
        working-directory: ./backend
        run: uv run pytest -vv -s src/tests

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version from tag
        id: vars
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            domitin/docx-backend:latest
            domitin/docx-backend:${{ steps.vars.outputs.version }}

      - name: Build and push auth_service image
        uses: docker/build-push-action@v6
        with:
          context: ./auth_service
          file: ./auth_service/Dockerfile
          push: true
          tags: |
            domitin/docx-auth-service:latest
            domitin/docx-auth-service:${{ steps.vars.outputs.version }}

      - name: Build and push nginx image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.nginx
          push: true
          tags: |
            domitin/docx-nginx:latest
            domitin/docx-nginx:${{ steps.vars.outputs.version }}